<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>majix demo</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>

    <style>
        body {
            margin: 0;
            padding: 0;
        }
        #map {
            height: 100vh;
            width: 100vw;
        }
        .ruian-table {
            border-collapse: collapse;
            width: 100%;
            font-size: 12px;
            margin-top: 8px;
        }
        .ruian-table th, .ruian-table td {
            text-align: left;
            padding: 4px;
            border-bottom: 1px solid #ddd;
        }
        .ruian-table th {
            width: 40%;
            color: #555;
        }
        .popup-title {
            font-size: 14px;
            font-weight: bold;
            border-bottom: 2px solid #ff7800;
            padding-bottom: 4px;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

<script>
    var map = L.map('map').setView([49.8, 15.5], 7);

    L.tileLayer('https://tile.openstreetmap.de/{z}/{x}/{y}.png', {
        maxZoom: 20,
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    var layerDictionary = {};
    var currentHoveredId = null;

    fetch('/api/parcels/')
        .then(response => response.json())
        .then(data => {

            var parcelLayer = L.geoJSON(data, {
                style: function (feature) {
                    return {
                        color: "#ff0000",
                        weight: 1,
                        fillColor: "#ff7800",
                        fillOpacity: 0.1
                    };
                },

                onEachFeature: function (feature, layer) {
                    if (feature.id) {
                        layerDictionary[feature.id] = layer;
                    }

                    layer.bindPopup("<div style='padding: 10px;'>Načítám detailní data z RÚIAN...</div>");

                    layer.on({
                        click: function (e) {

                            // Nyní již 100% jistě bereme id_2 !
                            var ruianId = feature.properties.id_2;

                            var ruianApiUrl = `https://ags.cuzk.gov.cz/arcgis/rest/services/RUIAN/Prohlizeci_sluzba_nad_daty_RUIAN/MapServer/5/query?where=id=${ruianId}&outFields=*&f=pjson`;

                            fetch(ruianApiUrl)
                                .then(res => res.json())
                                .then(ruianData => {

                                    console.log("RUIAN Data pro parcelu " + ruianId + ":", ruianData);

                                    if (ruianData.features && ruianData.features.length > 0) {

                                        var attrs = ruianData.features[0].attributes;

                                        var cisloParcely = attrs.cisloparcely || '';
                                        var druhCislovani = attrs.druhcislovanikod === 1 ? 'Stavební' : 'Pozemková';

                                        var popupContent = `
                                            <div class="popup-title">Parcela č. ${cisloParcely}</div>
                                            <table class="ruian-table">
                                                <tr><th>RÚIAN ID:</th><td>${ruianId}</td></tr>
                                                <tr><th>Číslo parcely:</th><td>${cisloParcely}</td></tr>
                                                <tr><th>Druh číslování:</th><td>${druhCislovani}</td></tr>
                                                <tr><th>Kód kat. území:</th><td>${attrs.katastralniuzemi || '-'}</td></tr>
                                                <tr><th>Výměra:</th><td><b>${attrs.vymeraparcely || 0} m²</b></td></tr>
                                                <tr><th>Platí do:</th><td>${attrs.platido || 'Současnost'}</td></tr>
                                            </table>
                                            <br>
                                            <a href="https://vdp.cuzk.cz/vdp/ruian/parcely/${ruianId}" target="_blank" style="display:block; text-align:center; background:#ff7800; color:white; padding:5px; text-decoration:none; border-radius:3px;">
                                                Zobrazit detail v Katastru (VDP)
                                            </a>
                                        `;
                                        layer.setPopupContent(popupContent);
                                    } else {
                                        layer.setPopupContent(`
                                            <b>Data z RÚIAN nenalezena</b><br>
                                            <small>API nevrátilo data pro RÚIAN ID ${ruianId}</small><br><br>
                                            <a href="https://vdp.cuzk.cz/vdp/ruian/parcely/${ruianId}" target="_blank">Zkusit otevřít ve VDP</a>
                                        `);
                                    }
                                })
                                .catch(err => {
                                    console.error("Chyba API:", err);
                                    layer.setPopupContent("Chyba při stahování dat z ČÚZK API.");
                                });
                        },

                        mouseover: function (e) {
                            currentHoveredId = feature.id;
                            var hoveredLayer = e.target;

                            hoveredLayer.setStyle({
                                color: '#0055ff',
                                weight: 3,
                                fillOpacity: 0.5
                            });

                            if (!L.Browser.ie && !L.Browser.opera && !L.Browser.edge) {
                                hoveredLayer.bringToFront();
                            }

                            fetch(`/api/parcels/${feature.id}/neighbors/`)
                                .then(res => res.json())
                                .then(neighborData => {
                                    if (currentHoveredId === feature.id && neighborData.neighbor_ids) {
                                        neighborData.neighbor_ids.forEach(neighborId => {
                                            var neighborLayer = layerDictionary[neighborId];
                                            if (neighborLayer) {
                                                neighborLayer.setStyle({
                                                    color: '#00ff00',
                                                    weight: 2,
                                                    fillColor: '#00ff00',
                                                    fillOpacity: 0.4
                                                });
                                            }
                                        });
                                    }
                                });
                        },

                        mouseout: function (e) {
                            currentHoveredId = null;
                            parcelLayer.resetStyle();
                        }
                    });
                }
            }).addTo(map);

            map.fitBounds(parcelLayer.getBounds());
        })
        .catch(error => console.error('Error fetching parcels:', error));

</script>
</body>
</html>
